name: CI - Testes Automatizados

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  testes:
    name: Executar testes
    runs-on: ubuntu-latest
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Executar lint
        run: npm run lint

      - name: Executar testes automatizados
        run: npm test

      - name: Gerar relatorio de testes
        if: always()
        run: npm run report

      - name: Publicar relatorio na pipeline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: |
            relatorio-testes.json
            relatorio-testes.html
          if-no-files-found: error
          retention-days: 7

      - name: Validar secrets de e-mail
        if: always()
        run: |
          missing=0

          for secret in SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_PASSWORD EMAIL_TO; do
            if [ -z "${!secret}" ]; then
              echo "::error::O secret $secret nao foi configurado em Settings > Secrets and variables > Actions."
              missing=1
            fi
          done

          exit $missing

      - name: Enviar relatorio por e-mail
        if: ${{ always() && env.SMTP_SERVER != '' && env.SMTP_PORT != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: Relatorio de testes - ${{ github.repository }}
          to: ${{ env.EMAIL_TO }}
          from: GitHub Actions <${{ env.SMTP_USERNAME }}>
          body: |
            Ola!

            A pipeline foi executada e os relatorios de testes estao anexados neste e-mail.

            Repositorio: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref_name }}
            Status do job: ${{ job.status }}
            Execucao: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: relatorio-testes.html,relatorio-testes.json
