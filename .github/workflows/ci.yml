name: CI - Testes Automatizados

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  testes:
    name: Executar testes
    runs-on: ubuntu-latest
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configurar Java para Allure
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores do Playwright
        run: npx playwright install --with-deps chromium

      - name: Executar lint
        run: npm run lint

      - name: Executar testes
        run: npm test

      - name: Gerar relatorio Allure
        if: always()
        run: npm run allure:generate

      - name: Configurar GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Preparar relatorio para GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Publicar relatorio no GitHub Pages
        if: always()
        id: publicar-pages
        uses: actions/deploy-pages@v4

      - name: Publicar relatorio Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
            allure-report/
          if-no-files-found: warn
          retention-days: 7

      - name: Enviar relatorio por e-mail
        if: ${{ always() && env.SMTP_SERVER != '' && env.SMTP_PORT != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: Relatorio de testes - ${{ github.repository }}
          to: ${{ env.EMAIL_TO }}
          from: GitHub Actions <${{ env.SMTP_USERNAME }}>
          body: |
            Ola!

            A pipeline foi executada.

            Repositorio: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref_name }}
            Status do job: ${{ job.status }}
            Execucao: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Relatorio Allure: ${{ steps.publicar-pages.outputs.page_url }}

            O relatorio Allure tambem esta disponivel nos artifacts da execucao.
