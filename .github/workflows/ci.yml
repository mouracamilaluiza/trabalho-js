name: CI - Testes Automatizados

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  testes:
    name: Executar testes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Executar testes automatizados
        run: npm test

      - name: Gerar relatorio de testes
        if: always()
        run: npm run report

      - name: Publicar relatorio na pipeline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: |
            relatorio-testes.json
            relatorio-testes.html
          if-no-files-found: error
          retention-days: 7
