name: CI - Testes Automatizados

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  testes:
    name: Executar testes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Executar lint
        run: npm run lint

      - name: Executar testes automatizados
        run: npm test

      - name: Gerar relatorio de testes
        if: always()
        run: npm run report

      - name: Publicar relatorio na pipeline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: |
            relatorio-testes.json
            relatorio-testes.html
          if-no-files-found: error
          retention-days: 7

      - name: Enviar relatorio por e-mail
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Relatorio de testes - ${{ github.repository }}
          to: ${{ secrets.SMTP_USERNAME }}
          from: GitHub Actions
          body: |
            Ola!

            A pipeline foi executada e os relatorios de testes estao anexados neste e-mail.

            Repositorio: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref_name }}
            Status do job: ${{ job.status }}
            Execucao: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: relatorio-testes.html,relatorio-testes.json
